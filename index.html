<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + Vue + Typescript App</title>
  </head>

  <body>
    <script>
      // Apply theme before Vue mounts to prevent flash of wrong theme.
      // Canvas windows (/canvas or ?specId=) skip this — they keep their own styles.
      (function(){
        if(/\/canvas|specId=/.test(location.pathname+location.search))return;
        var p;try{p=localStorage.getItem('locus-theme-preference')}catch(e){}
        var t=p==='light'?'light':p==='dark'?'dark':
          (window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
        document.documentElement.setAttribute('data-theme',t);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
